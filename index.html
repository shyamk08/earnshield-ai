<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EarnShield AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    
    <header>
      <h1>EarnShield AI</h1>
      <p>AI-Based Income Protection</p>
    </header>

    <div class="card">
      <h2>User Registration</h2>
      <input type="text" id="name" placeholder="Enter Name">
      <select id="zone">
        <option value="low">Low Risk Zone</option>
        <option value="medium">Medium Risk Zone</option>
        <option value="high">High Risk Zone</option>
      </select>
      <button onclick="generatePolicy()">Create Policy</button>
    </div>

    <div class="card">
      <h2>Policy Details</h2>
      <p id="risk"></p>
      <p id="premium"></p>
    </div>

    <div class="card">
      <h2>Live Monitoring</h2>
      <button onclick="simulateDisruption()">Trigger Disruption</button>
      <p id="status"></p>
      <p id="payout"></p>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
